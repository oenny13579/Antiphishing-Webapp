<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScanLine Admin — Review Queue</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
<style>
  :root {
    --bg: #FAF8F4;
    --ink: #1A2332;
    --ink-soft: #3D4856;
    --slate: #8B95A1;
    --amber: #E8893A;
    --amber-bg: #FCEEE0;
    --sage: #5B8266;
    --sage-bg: #E9F0E8;
    --card-border: #E5E0D5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  .mono { font-family: 'SF Mono', 'JetBrains Mono', 'Courier New', monospace; }
  .app { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px 20px; }
  header { margin-bottom: 28px; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--slate); margin: 0 0 6px 0; display: flex; align-items: center; gap: 8px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sage); display: inline-block; }
  .status-dot.offline { background: var(--amber); }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .subhead { font-size: 14px; color: var(--ink-soft); margin: 8px 0 0 0; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--slate); }
  .empty-state p { font-size: 14px; margin: 8px 0 0 0; }
  .report-card {
    background: #fff; border: 1.5px solid var(--card-border);
    border-radius: 14px; padding: 20px; margin-bottom: 14px;
  }
  .report-text { font-size: 15px; font-weight: 600; color: var(--ink); margin: 0 0 4px 0; word-break: break-word; line-height: 1.4; }
  .report-meta { font-size: 12px; color: var(--slate); margin: 0 0 14px 0; }
  .reasons-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .reason-pill {
    font-size: 11px; padding: 4px 10px;
    background: var(--amber-bg); color: #8A4A14;
    border-radius: 20px; font-weight: 600;
  }
  .other-note {
    font-size: 13px; color: var(--ink-soft);
    background: #F5F3EC; padding: 10px 12px;
    border-radius: 8px; margin-bottom: 16px;
  }
  .action-row { display: flex; gap: 10px; align-items: center; }
  .severity-select {
    padding: 9px 10px; border: 1.5px solid var(--card-border);
    border-radius: 8px; font-size: 13px; font-family: inherit; background: #fff;
  }
  .admin-btn {
    padding: 10px 16px; border-radius: 8px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: 1.5px solid var(--card-border); background: #fff;
  }
  .admin-btn.approve { background: var(--sage-bg); border-color: #BFD6C2; color: #3D6B49; }
  .admin-btn.reject { background: var(--amber-bg); border-color: #F0C49C; color: #8A4A14; }
  .admin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .processed-tag { font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px; }
  .processed-tag.approved { background: var(--sage-bg); color: #3D6B49; }
  .processed-tag.rejected { background: var(--amber-bg); color: #8A4A14; }
  .refresh-btn {
    font-size: 12px; color: var(--slate); background: none;
    border: none; cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
  }
  .refresh-btn:hover { color: var(--ink); }
  .error-banner {
    margin-top: 16px; padding: 14px; border-radius: 10px;
    background: var(--amber-bg); border: 1.5px solid #F0C49C;
    font-size: 13px; color: #8A4A14;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const API_URL = "http://127.0.0.1:8000";

const REASON_LABELS = {
  reason_impersonation: "Impersonation",
  reason_urgency: "Urgency",
  reason_link_mismatch: "Link mismatch",
  reason_requests_info: "Requests info",
};

function ReportCard({ report, onProcessed }) {
  const [severity, setSeverity] = useState(2);
  const [busy, setBusy] = useState(false);
  const [processedAs, setProcessedAs] = useState(null);
  const [err, setErr] = useState(null);

  const activeReasons = Object.keys(REASON_LABELS).filter(k => report[k]);

  async function handleApprove() {
    setBusy(true); setErr(null);
    try {
      const res = await fetch(`${API_URL}/admin/reports/${report.id}/approve`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ severity: Number(severity) }),
      });
      if (!res.ok) throw new Error();
      setProcessedAs("approved");
      onProcessed();
    } catch {
      setErr("Couldn't approve this report. Try again.");
    } finally {
      setBusy(false);
    }
  }

  async function handleReject() {
    setBusy(true); setErr(null);
    try {
      const res = await fetch(`${API_URL}/admin/reports/${report.id}/reject`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ notes: "Rejected from admin queue" }),
      });
      if (!res.ok) throw new Error();
      setProcessedAs("rejected");
      onProcessed();
    } catch {
      setErr("Couldn't reject this report. Try again.");
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="report-card">
      <p className="report-text">{report.submitted_text}</p>
      <p className="report-meta mono">#{report.id} · submitted {new Date(report.created_at).toLocaleString()}</p>
      {activeReasons.length > 0 && (
        <div className="reasons-row">
          {activeReasons.map(k => <span key={k} className="reason-pill">{REASON_LABELS[k]}</span>)}
        </div>
      )}
      {report.reason_other && <p className="other-note">"{report.reason_other}"</p>}
      {processedAs ? (
        <span className={`processed-tag ${processedAs}`}>
          {processedAs === "approved" ? "Approved — added to database" : "Rejected"}
        </span>
      ) : (
        <div className="action-row">
          <select className="severity-select" value={severity} onChange={e => setSeverity(e.target.value)} disabled={busy}>
            <option value="1">Severity: low</option>
            <option value="2">Severity: medium</option>
            <option value="3">Severity: high</option>
          </select>
          <button className="admin-btn approve" onClick={handleApprove} disabled={busy}>Approve</button>
          <button className="admin-btn reject" onClick={handleReject} disabled={busy}>Reject</button>
        </div>
      )}
      {err && <div className="error-banner">{err}</div>}
    </div>
  );
}

function App() {
  const [reports, setReports] = useState([]);
  const [loading, setLoading] = useState(true);
  const [apiOnline, setApiOnline] = useState(null);
  const [err, setErr] = useState(null);

  async function loadReports() {
    setLoading(true); setErr(null);
    try {
      const res = await fetch(`${API_URL}/admin/reports`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      setReports(data.reports);
      setApiOnline(true);
    } catch {
      setApiOnline(false);
      setErr("Couldn't reach the backend. Make sure uvicorn is running.");
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { loadReports(); }, []);

  return (
    <div className="app">
      <header>
        <p className="eyebrow">
          <span className={`status-dot ${apiOnline === false ? "offline" : ""}`} />
          {apiOnline === false ? "Backend offline" : "Admin connected"}
        </p>
        <h1>Review queue</h1>
        <p className="subhead">User-submitted reports waiting for approval. Approving promotes a report straight into the live phishing pattern database.</p>
      </header>
      {err && <div className="error-banner">{err}</div>}
      {!loading && reports.length === 0 && !err && (
        <div className="empty-state">
          <p className="mono" style={{fontSize:"13px"}}>Queue is empty</p>
          <p>No reports waiting for review right now.</p>
        </div>
      )}
      {reports.map(r => <ReportCard key={r.id} report={r} onProcessed={loadReports} />)}
      <div style={{marginTop:"20px", textAlign:"center"}}>
        <button className="refresh-btn" onClick={loadReports}>Refresh queue</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
